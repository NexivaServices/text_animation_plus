name: text_animation_plus
description: >-
  23 plug-and-play Flutter text animation widgets: split, blur, typewriter,
  glitch, curved marquee, scramble, gradient, scroll-reactive, and more.
version: 0.1.0
homepage: https://github.com/NexivaServices/text_animation_plus
repository: https://github.com/NexivaServices/text_animation_plus
issue_tracker: https://github.com/NexivaServices/text_animation_plus/issues

topics:
  - animation
  - flutter
  - text
  - effects
  - widget

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  characters: ^1.4.0
  visibility_detector: ^0.4.0+2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
